<body>

    <section id="login" class="tela_login">
        <header>
            <nav class="barra_login">
                <ul class="topicos_login">
                    <li><a href="./index.html" class="bt_home">HOME</a></li>
                    <li><a href="./historia" class="bt_hist" id="id_hist">HISTÓRIA</a></li>
                    <li><a href="#" class="bt_cur" id="id-cur">CURIOSIDADES</a></li>
                    <li><a href="./cadastro.html" class="bt_cad" id="id_cad" onclick="irCadastro()">CADASTRO</a></li>
                    <li><a href="./login.html" class="bt_log" onclick="irParaLogin()">LOGIN</a></li>
                </ul>

        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>

        <div class="box_login">
            <h2 class="tituloLogin">FAÇA LOGIN</h2>

            <p class="topo">USUÁRIO/EMAIL</p>
            <input class='ipt' type="text" id="email_input" placeholder="alfa@gmail.com"><br><br>

            <p class="topo">SENHA</p>
            <input class='ipt' type="password" id="senha_input" placeholder="BeaconHills123"><br><br>
           
            <button id="button_validar" onclick="entrar()">Entrar</button><br><br>
        </div>
        <div class="box_imagem_login">
                <div class="imagem_login"></div>

            </div>

        <div id="div_aguardar" class="loading-div">

        </div>

        <div id="div_erros_login"></div>
        </div>
        </div>
        </div>

        <!--footer inicio-->

            </div>
        </div>
        <!--footer fim-->

</body>

</html>

<script>


    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
